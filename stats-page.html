<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vetAltas 后台统计</title>
  <link rel="icon" href="/assets/vetaltas-logo-v4.svg" type="image/svg+xml" />
  <style>
    :root{color-scheme:light;--bg:#f3f7f7;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#d9e4e3;--teal:#0f766e;--teal-dark:#115e59;--rose:#be123c;--amber:#b45309}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    header{border-bottom:1px solid var(--line);background:rgba(255,255,255,.94);backdrop-filter:blur(10px)}
    .bar{max-width:1120px;margin:auto;padding:18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:12px}.brand img{width:44px;height:44px;border-radius:8px}.brand h1{margin:0;font-size:24px}.brand p{margin:2px 0 0;color:var(--muted);font-weight:650}
    .actions{display:flex;gap:10px;flex-wrap:wrap}a,button{border-radius:8px;font-weight:800}a{color:var(--teal);text-decoration:none}
    .btn{display:inline-flex;align-items:center;border:1px solid var(--line);background:white;padding:10px 12px;color:var(--text)}.primary{border-color:var(--teal);background:var(--teal);color:white}
    main{max-width:1120px;margin:auto;padding:22px 18px 44px}
    .status{margin-bottom:16px;border:1px solid var(--line);background:white;border-radius:8px;padding:14px 16px;color:var(--muted);font-weight:700}
    .status.ok{border-color:#99f6e4;color:var(--teal-dark);background:#f0fdfa}.status.warn{border-color:#fde68a;color:var(--amber);background:#fffbeb}.status.bad{border-color:#fecdd3;color:var(--rose);background:#fff1f2}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px;box-shadow:0 8px 24px rgba(15,23,42,.05)}
    .metric span{display:block;color:var(--muted);font-size:13px;font-weight:800}.metric b{display:block;margin-top:8px;color:var(--teal);font-size:34px;line-height:1}
    .section{margin-top:16px}.section h2{font-size:18px;margin:0 0 12px}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:680px}
    .table th,.table td{border-bottom:1px solid var(--line);padding:11px 10px;text-align:left;font-size:14px}.table th{color:var(--muted);font-size:12px;text-transform:uppercase}
    .muted{color:var(--muted)}.empty{padding:24px;color:var(--muted);font-weight:700;text-align:center}.pill{display:inline-flex;border-radius:999px;background:#ccfbf1;color:var(--teal-dark);padding:4px 8px;font-size:12px;font-weight:900}
    @media(max-width:820px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.brand h1{font-size:20px}}@media(max-width:520px){.grid{grid-template-columns:1fr}.actions{width:100%}.btn{justify-content:center;flex:1}}
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="brand">
        <img src="/assets/vetaltas-logo-v4.svg" alt="vetAltas" />
        <div><h1>vetAltas 后台统计</h1><p>连接当前最新版网站数据</p></div>
      </div>
      <div class="actions">
        <a class="btn" href="/">打开最新版网页</a>
        <button class="btn primary" id="refresh" type="button">刷新</button>
      </div>
    </div>
  </header>
  <main>
    <div id="status" class="status">正在连接后台...</div>
    <div class="grid">
      <div class="card metric"><span>访问事件</span><b id="events">0</b></div>
      <div class="card metric"><span>会话数</span><b id="sessions">0</b></div>
      <div class="card metric"><span>页面浏览</span><b id="views">0</b></div>
      <div class="card metric"><span>活跃秒数</span><b id="seconds">0</b></div>
    </div>
    <section class="card section">
      <h2>热门页面</h2>
      <div class="table-wrap">
        <table class="table">
          <thead><tr><th>页面</th><th>标题</th><th>浏览</th></tr></thead>
          <tbody id="pages"><tr><td class="empty" colspan="3">暂无数据</td></tr></tbody>
        </table>
      </div>
    </section>
    <section class="card section">
      <h2>连接状态</h2>
      <p class="muted" id="details">等待检测...</p>
      <p><span class="pill" id="storage">checking</span></p>
    </section>
  </main>
  <script>
    const el = (id) => document.getElementById(id);
    function setStatus(text, mode) {
      el("status").className = "status " + mode;
      el("status").textContent = text;
    }
    function number(value) {
      return Number(value || 0).toLocaleString("zh-CN");
    }
    async function loadStats() {
      setStatus("正在连接后台...", "");
      try {
        const response = await fetch("/api/stats?ts=" + Date.now(), { cache: "no-store" });
        if (!response.ok) throw new Error("HTTP " + response.status);
        const data = await response.json();
        if (!data.ok) throw new Error(data.error || "stats unavailable");
        el("events").textContent = number(data.total_events);
        el("sessions").textContent = number(data.sessions);
        el("views").textContent = number(data.page_views);
        el("seconds").textContent = number(data.active_seconds);
        el("storage").textContent = data.storage === "connected" ? "数据存储已连接" : "等待配置数据存储";
        el("details").textContent = data.storage === "connected"
          ? "后台已连接最新版网页统计接口。最近数据时间：" + (data.latest_event_at || "暂无")
          : "后台页面和接口已恢复；如需跨访客累计数据，请在 Vercel 配置 KV/Upstash Redis 环境变量。";
        const pages = Array.isArray(data.top_pages) ? data.top_pages : [];
        el("pages").innerHTML = pages.length
          ? pages.map((page) => "<tr><td><a href='" + page.path + "'>" + page.path + "</a></td><td>" + (page.title || "") + "</td><td>" + number(page.views) + "</td></tr>").join("")
          : "<tr><td class='empty' colspan='3'>暂无数据</td></tr>";
        setStatus("后台已连接最新版网页。", data.storage === "connected" ? "ok" : "warn");
      } catch (error) {
        setStatus("后台连接失败：" + error.message, "bad");
        el("details").textContent = "请确认 /api/stats 已随 Vercel 最新部署上线。";
      }
    }
    el("refresh").addEventListener("click", loadStats);
    loadStats();
  </script>
</body>
</html>
